name: Build Shapely Android Wheel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install cross build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl unzip zip pkg-config ninja-build cmake autoconf automake libtool make patch
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Build Android wheel
        env:
          ANDROID_API: "24"
          ANDROID_ABI: "arm64-v8a"
        run: |
          bash ./build_shapely_android.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shapely-wheel
          path: dist/*
